<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Shopee</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background-color: #fff;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Left Section */
        .left-section {
            flex: 1;
            background: linear-gradient(135deg, #FF6B35 0%, #FF5722 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .brand-content {
            text-align: center;
            color: white;
        }

        .logo {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        .brand-name {
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .brand-tagline {
            font-size: 18px;
            font-weight: 400;
            line-height: 1.5;
            opacity: 0.95;
        }

        /* Right Section */
        .right-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background-color: #f9f9f9;
        }

        .signup-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 50px 40px;
            width: 100%;
            max-width: 380px;
        }

        .signup-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }

        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-input {
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #FF6B35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .form-input::placeholder {
            color: #999;
        }

        .btn-signup {
            padding: 14px 16px;
            background: linear-gradient(135deg, #FF6B35 0%, #FF5722 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
        }

        .btn-signup:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
            color: #999;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #ddd;
        }

        .social-login {
            display: flex;
            gap: 12px;
        }

        .btn-social {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-social:hover {
            border-color: #ccc;
            background-color: #f5f5f5;
        }

        .btn-facebook {
            color: #1877F2;
        }

        .btn-google {
            color: #EA4335;
        }

        .form-footer {
            font-size: 12px;
            color: #999;
            text-align: center;
            line-height: 1.5;
            margin-top: 10px;
        }

        .link {
            color: #FF6B35;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .link:hover {
            color: #FF5722;
            text-decoration: underline;
        }

        .login-link {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-top: 15px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .left-section {
                min-height: 200px;
                padding: 30px 20px;
            }

            .right-section {
                flex: 1;
                padding: 20px;
            }

            .signup-card {
                padding: 30px 25px;
            }

            .brand-name {
                font-size: 36px;
            }

            .brand-tagline {
                font-size: 16px;
            }

            .signup-title {
                font-size: 24px;
            }

            .social-login {
                flex-direction: column;
            }

            .btn-social {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .signup-card {
                padding: 25px 20px;
            }

            .brand-name {
                font-size: 28px;
            }

            .signup-title {
                font-size: 20px;
            }

            .form-input,
            .btn-signup {
                font-size: 16px;
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Section -->
        <div class="left-section">
            <div class="brand-content">
                <div class="logo">
                    <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Shopping Bag -->
                        <path d="M40 30C40 20.6 47.6 12 57 12H63C72.4 12 80 20.6 80 30" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M100 40H20C18 40 17 42 17 44V95C17 105.6 24.4 113 35 113H85C95.6 113 103 105.6 103 95V44C103 42 102 40 100 40Z" stroke="white" stroke-width="3.5" fill="white" stroke-linecap="round" stroke-linejoin="round"/>
                        <!-- S Letter -->
                        <text x="60" y="85" font-size="45" font-weight="bold" fill="#FF6B35" text-anchor="middle" font-family="Arial">S</text>
                    </svg>
                </div>
                <h1 class="brand-name">Shopee</h1>
                <p class="brand-tagline">The leading online marketplace<br>in your region</p>
            </div>
        </div>

        <!-- Right Section -->
        <div class="right-section">
            <div class="signup-card">
                <h2 class="signup-title">Sign Up</h2>
                
                <form class="signup-form" id="signupForm">
                    <div class="form-group">
                        <input 
                            type="tel" 
                            class="form-input" 
                            placeholder="Phone Number" 
                            id="phoneNumber"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-signup">NEXT</button>

                    <div class="divider">
                        <span>or</span>
                    </div>

                    <div class="social-login">
                        <button type="button" class="btn-social btn-facebook">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M10 0C4.477 0 0 4.477 0 10c0 4.991 3.657 9.128 8.438 9.879V12.89h-2.54V10h2.54V7.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.24 0-1.45.586-1.45 1.449V10h2.899l-.377 2.89h-2.522v4.989C16.343 19.129 20 14.991 20 10c0-5.523-4.477-10-10-10z"/>
                            </svg>
                            Facebook
                        </button>
                        <button type="button" class="btn-social btn-google">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <!-- Google Blue -->
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <!-- Google Red -->
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <!-- Google Yellow -->
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                <!-- Google Red -->
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            Google
                        </button>
                    </div>

                    <p class="form-footer">
                        By signing up, you agree to our 
                        <a href="#" class="link">Terms of Service</a> & 
                        <a href="#" class="link">Privacy Policy</a>
                    </p>

                    <p class="login-link">
                        Already have an account? <a href="#" class="link">Log in</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
